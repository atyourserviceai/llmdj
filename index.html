<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LLMDJ - AI-powered Spotify DJ agent. Control your music through natural language conversation."
    />
    <meta name="theme-color" content="#1DB954" />
    <meta name="keywords" content="AI, DJ, Spotify, music, playlist, agent, artificial intelligence" />

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LLMDJ - AI Spotify DJ Agent" />
    <meta property="og:description" content="Control your Spotify music through natural language conversation with an AI DJ agent." />
    <meta property="og:image" content="/favicon.ico" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LLMDJ - AI Spotify DJ Agent" />
    <meta name="twitter:description" content="Control your Spotify music through natural language conversation with an AI DJ agent." />

    <!-- Audio/Music specific meta tags -->
    <meta name="music" content="enabled" />
    <meta name="audio" content="enabled" />

    <title>LLMDJ - AI Spotify DJ</title>

    <!-- Spotify Web Playback SDK -->
    <script src="https://sdk.scdn.co/spotify-player.js"></script>

    <script>
      document.documentElement.classList.toggle(
        "dark",
        localStorage.theme === "dark" ||
          (!("theme" in localStorage) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
      );
    </script>

    <!-- Favicon support -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Preload fonts if any -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Prevent flash of unstyled content -->
    <style>
      html {
        background: var(--background);
      }
      @media (prefers-color-scheme: dark) {
        html {
          background: var(--background);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="app"></div>
    <script type="module" src="/src/client.tsx"></script>
  </body>
</html>
